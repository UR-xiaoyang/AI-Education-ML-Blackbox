# ai-edu docker-compose
# Usage: docker compose up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-edu-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - DB_MODE=sqlite
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-Admin@123456}
      - DEFAULT_ADMIN_DISPLAY_NAME=${DEFAULT_ADMIN_DISPLAY_NAME:-系统管理员}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - TURNSTILE_ENABLED=${TURNSTILE_ENABLED:-false}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
    volumes:
      # Persist SQLite database
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "sh", "-c", "no_proxy=localhost curl -sf http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-edu-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-edu-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://backend:3001
      - PORT=80
    networks:
      - ai-edu-network

volumes:
  backend-data:
    driver: local

networks:
  ai-edu-network:
    driver: bridge
